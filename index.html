<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borregos Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1628;
      --navy-mid: #112244;
      --gold: #c8a84b;
      --gold-light: #e8c96e;
      --white: #f5f0e8;
      --gray: #8a9bb5;
      --success: #2ecc71;
      --error: #e74c3c;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, #1a3060 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, #0d2240 0%, transparent 50%);
      pointer-events: none;
    }

    /* Diagonal stripe accent */
    body::after {
      content: '';
      position: fixed;
      top: -100px;
      right: -80px;
      width: 300px;
      height: 600px;
      background: linear-gradient(135deg, transparent 40%, rgba(200,168,75,0.06) 40%, rgba(200,168,75,0.06) 60%, transparent 60%);
      transform: rotate(-15deg);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--navy-mid);
      border: 1px solid rgba(200,168,75,0.25);
      border-radius: 16px;
      padding: 40px 32px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-ram {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .team-sub {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,168,75,0.4), transparent);
      margin: 24px 0;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--white);
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--gray);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .select-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 14px 44px 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,168,75,0.3);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    select:focus {
      border-color: var(--gold);
      background: rgba(200,168,75,0.06);
    }

    select option {
      background: var(--navy-mid);
      color: var(--white);
    }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
      font-size: 12px;
    }

    .datetime-display {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dt-date {
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
    }

    .dt-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--gold-light);
    }

    .btn-checkin {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      border: none;
      border-radius: 12px;
      color: var(--navy);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(200,168,75,0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-checkin::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn-checkin:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,168,75,0.45);
    }

    .btn-checkin:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-checkin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
      opacity: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      background: var(--success);
      color: #fff;
    }

    .toast.error {
      background: var(--error);
      color: #fff;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Confirmation overlay */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 32px;
    }

    .confirm-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-icon {
      font-size: 72px;
      margin-bottom: 16px;
      animation: pop 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .confirm-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 8px;
    }

    .confirm-time {
      color: var(--gray);
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-area">
      <div class="logo-ram">🐏</div>
      <div class="team-name">Borregos</div>
      <div class="team-sub">TEC MTY Laguna · Carrera Mayor</div>
    </div>

    <div class="divider"></div>

    <h1>Check-in</h1>
    <p class="subtitle">Selecciona tu nombre para registrar asistencia</p>

    <p class="field-label">Jugadora</p>
    <div class="select-wrapper">
      <select id="playerSelect">
        <option value="">— Elige tu nombre —</option>
        <option value="Viviana Serna Alvarado">Viviana Serna Alvarado</option>
        <option value="Layla Sada Reyes">Layla Sada Reyes</option>
        <option value="Vanya Daniela Pardo Guerrero">Vanya Daniela Pardo Guerrero</option>
        <option value="Vanessa Marian Rodríguez Ruelas">Vanessa Marian Rodríguez Ruelas</option>
        <option value="Karen Wolf Bustamante">Karen Wolf Bustamante</option>
        <option value="Isabella Estrada García">Isabella Estrada García</option>
        <option value="Martha Elena Camacho Zamora">Martha Elena Camacho Zamora</option>
        <option value="Amina Cassani Duarte">Amina Cassani Duarte</option>
        <option value="Indira Valeria Arratia Rodríguez">Indira Valeria Arratia Rodríguez</option>
        <option value="Dariela Lizette Chew Arroyo">Dariela Lizette Chew Arroyo</option>
        <option value="Barbara Michelle Peniche Garcia">Barbara Michelle Peniche Garcia</option>
        <option value="Ana Fernanda Vazquez Oviedo">Ana Fernanda Vazquez Oviedo</option>
        <option value="Cora Monserrat García Rodríguez">Cora Monserrat García Rodríguez</option>
        <option value="Ashley Ninet Marrufo Muñoz">Ashley Ninet Marrufo Muñoz</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>

    <p class="field-label">Fecha y hora</p>
    <div class="datetime-display">
      <span class="dt-date" id="displayDate">—</span>
      <span class="dt-time" id="displayTime">—</span>
    </div>

    <button class="btn-checkin" id="btnCheckin" onclick="registrarAsistencia()">
      REGISTRAR ASISTENCIA
    </button>
  </div>

  <!-- Confirmation overlay -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-icon">✅</div>
    <div class="confirm-name" id="confirmName"></div>
    <div class="confirm-time" id="confirmTime"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC9dfAB_zzcsjAvuLuNtgM-RzmJ3usSsJw",
      authDomain: "borregascheckin.firebaseapp.com",
      projectId: "borregascheckin",
      storageBucket: "borregascheckin.firebasestorage.app",
      messagingSenderId: "359976373601",
      appId: "1:359976373601:web:60326d52b1ec2248d98920"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Clock
    function updateClock() {
      const now = new Date();
      const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('displayDate').textContent =
        now.toLocaleDateString('es-MX', dateOpts);
      document.getElementById('displayTime').textContent =
        now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.className = `toast ${type}`, 3000);
    }

    function showConfirm(name, timeStr) {
      const overlay = document.getElementById('confirmOverlay');
      document.getElementById('confirmName').textContent = '¡Presente, ' + name.split(' ')[0] + '!';
      document.getElementById('confirmTime').textContent = 'Registrada el ' + timeStr;
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 3000);
    }

    window.registrarAsistencia = async function() {
      const select = document.getElementById('playerSelect');
      const nombre = select.value;
      if (!nombre) { showToast('Selecciona tu nombre primero', 'error'); return; }

      const btn = document.getElementById('btnCheckin');
      btn.disabled = true;
      btn.textContent = 'REGISTRANDO...';

      try {
        const now = new Date();
        await addDoc(collection(db, 'asistencia'), {
          nombre,
          timestamp: Timestamp.fromDate(now),
          fecha: now.toLocaleDateString('es-MX'),
          hora: now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
        });

        const timeStr = now.toLocaleString('es-MX', {
          dateStyle: 'medium', timeStyle: 'short'
        });
        showConfirm(nombre, timeStr);
        select.value = '';

      } catch (err) {
        console.error(err);
        showToast('Error al registrar. Intenta de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'REGISTRAR ASISTENCIA';
      }
    };
  </script>
</body>
</html>
