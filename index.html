// ── PHOTO CROPPER ─────────────────────────────────────────────────────────────
const SIZE=240;
const PhotoCropper = ({src,onConfirm,onCancel}) => {
  const canvasRef=useRef(); const imgRef=useRef(null); const dragRef=useRef({active:false,sx:0,sy:0,ox:0,oy:0});
  const [offset,setOffset]=useState({x:0,y:0}); const [scale,setScale]=useState(1); const [minScale,setMinScale]=useState(1); const [loaded,setLoaded]=useState(false);
  useEffect(()=>{ const img=new Image(); img.onload=()=>{ imgRef.current=img; const ms=Math.max(SIZE/img.width,SIZE/img.height); setMinScale(ms);setScale(ms);setOffset({x:0,y:0});setLoaded(true); }; img.src=src; },[src]);
  useEffect(()=>{ if(!loaded||!canvasRef.current||!imgRef.current)return; const ctx=canvasRef.current.getContext("2d"); const img=imgRef.current; ctx.clearRect(0,0,SIZE,SIZE); const w=img.width*scale,h=img.height*scale; const x=(SIZE-w)/2+offset.x,y=(SIZE-h)/2+offset.y; ctx.save(); ctx.beginPath();ctx.arc(SIZE/2,SIZE/2,SIZE/2,0,Math.PI*2);ctx.clip(); ctx.drawImage(img,x,y,w,h); ctx.restore(); },[loaded,offset,scale]);
  const startDrag=(cx,cy)=>{dragRef.current={active:true,sx:cx,sy:cy,ox:offset.x,oy:offset.y};};
  const moveDrag=(cx,cy)=>{ if(!dragRef.current.active)return; const{sx,sy,ox,oy}=dragRef.current; setOffset({x:ox+cx-sx,y:oy+cy-sy}); };
  const endDrag=()=>{dragRef.current.active=false;};
  const confirm=()=>{ const out=document.createElement("canvas"); out.width=SIZE;out.height=SIZE; out.getContext("2d").drawImage(canvasRef.current,0,0); onConfirm(out.toDataURL("image/jpeg",0.85)); };
  return (
    <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4">
      <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-xs w-full space-y-5">
        <div><div className="font-display text-2xl tracking-widest text-blue-400">AJUSTAR FOTO</div><p className="text-slate-400 text-xs mt-1">Arrastra para centrar el rostro</p></div>
        <div className="flex justify-center">
          <canvas ref={canvasRef} width={SIZE} height={SIZE} style={{borderRadius:"50%",border:"3px solid rgba(59,130,246,0.5)",cursor:"grab",touchAction:"none",display:"block"}}
            onMouseDown={e=>startDrag(e.clientX,e.clientY)} onMouseMove={e=>moveDrag(e.clientX,e.clientY)} onMouseUp={endDrag} onMouseLeave={endDrag}
            onTouchStart={e=>startDrag(e.touches[0].clientX,e.touches[0].clientY)}
            onTouchMove={e=>{e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}} onTouchEnd={endDrag}/>
        </div>
        <div className="space-y-1.5">
          <div className="flex justify-between text-xs text-slate-500"><span className="uppercase tracking-widest">Zoom</span><span>{Math.round((scale/minScale)*100)}%</span></div>
          <input type="range" min={minScale} max={minScale*3} step={0.01} value={scale} onChange={e=>setScale(parseFloat(e.target.value))} className="w-full h-1.5 rounded-full accent-blue-500 cursor-pointer"/>
        </div>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold text-sm">Cancelar</button>
          <button onClick={confirm} className="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm">Usar foto</button>
        </div>
      </div>
    </div>
  );
};

const FotoUpload = ({value,onChange}) => {
  const ref=useRef(); const [cropSrc,setCropSrc]=useState(null);
  const handleFile=(e)=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>setCropSrc(ev.target.result); r.readAsDataURL(f); e.target.value=""; };
  return (
    <>
      <div className="flex flex-col items-center gap-2">
        <div onClick={()=>ref.current.click()} className="w-28 h-28 rounded-full border-2 border-dashed border-slate-600 hover:border-blue-500/60 bg-slate-800/50 flex flex-col items-center justify-center cursor-pointer transition-all overflow-hidden">
          {value?<img src={value} alt="Foto" className="w-full h-full object-cover"/>:<><div className="text-3xl">📷</div><div className="text-[10px] text-slate-500 tracking-widest mt-1">SUBIR FOTO</div></>}
        </div>
        {value&&<div className="flex gap-3"><button type="button" onClick={()=>ref.current.click()} className="text-xs text-blue-400">Cambiar</button><button type="button" onClick={()=>onChange("")} className="text-xs text-red-400">Quitar</button></div>}
        <input ref={ref} type="file" accept="image/*" onChange={handleFile} className="hidden"/>
      </div>
      {cropSrc&&<PhotoCropper src={cropSrc} onConfirm={c=>{onChange(c);setCropSrc(null);}} onCancel={()=>setCropSrc(null)}/>}
    </>
  );
};

const RegistroForm = ({onSuccess}) => {

  const handleSubmit = async () => {
    if(!ok) return; setSubmitting(true);
    try {
      const fecha_registro = new Date().toLocaleDateString("es-MX");
      const ins = await DB.insert({...formData, fecha_registro, codigo:"TEMP"});
      const nid = ins[0].id; const codigo = genCodigo(nid);
      await DB.update(nid,{codigo});
      onSuccess({...ins[0], codigo});
    } catch(e) { alert("Error al registrar: "+e.message); }
    finally { setSubmitting(false); }
  };

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 flex-1 w-full">
              <Field label="Nombre(s)"><input className={iCls} placeholder="CARLOS" value={formData.nombre} onChange={e=>setFormData(f=>({...f,nombre:up(e.target.value)}))}/></Field>
              <Field label="Apellido Paterno"><input className={iCls} placeholder="GARCÍA" value={formData.apellido_paterno} onChange={e=>setFormData(f=>({...f,apellido_paterno:up(e.target.value)}))}/></Field>

              <Field label="Género"><select className={sCls} value={formData.genero} onChange={e=>setFormData(f=>({...f,genero:e.target.value}))}><option value="">Seleccionar...</option>{GENEROS.map(g=><option key={g}>{g}</option>)}</select></Field>

function App() {
  const [adminMode,setAdminMode]   = useState(isAdmin());
  const [showAdminLogin,setShowAdminLogin] = useState(false);
  const [publicView,setPublicView] = useState("registro");
  const [publicResult,setPublicResult] = useState(null);
  const [adminView,setAdminView]   = useState("lista");
  const [arbitros,setArbitros]     = useState([]);
  const [loading,setLoading]       = useState(false);
  const [selected,setSelected]     = useState(null);
  const [editData,setEditData]     = useState(EMPTY);
  const [nuevoData,setNuevoData]   = useState(EMPTY);
  const [submitting,setSubmitting] = useState(false);
  const [search,setSearch]         = useState("");
  const [filterEst,setFilterEst]   = useState("Todos");
  const [deleteConfirm,setDeleteConfirm] = useState(null);

  useEffect(()=>{
    if(!adminMode) return;
    setLoading(true);
    DB.getAll().then(d=>setArbitros(d||[])).catch(console.error).finally(()=>setLoading(false));
  },[adminMode]);

  const handleAdminLogin  = () => { setAdminMode(true); setShowAdminLogin(false); };
  const handleAdminLogout = () => { clearAdmin(); setAdminMode(false); setAdminView("lista"); };
  const handlePublicSuccess = (a) => { setPublicResult(a); setPublicView("exito"); };

  const handleNuevo = useCallback(async()=>{
    if(submitting) return; setSubmitting(true);
    try{
      const fecha_registro=new Date().toLocaleDateString("es-MX");
      const ins=await DB.insert({...nuevoData,fecha_registro,codigo:"TEMP"});
      const nid=ins[0].id; const codigo=genCodigo(nid);
      await DB.update(nid,{codigo});
      const a={...ins[0],codigo};
      setArbitros(p=>[...p,a]); setAdminView("lista"); setNuevoData(EMPTY);
    }catch(e){alert("Error: "+e.message);}
    finally{setSubmitting(false);}
  },[nuevoData,submitting]);

  const handleEdit = useCallback(async()=>{
    if(submitting) return; setSubmitting(true);
    try{
      const u=await DB.update(selected.id,{...editData}); const a=u[0];
      setArbitros(p=>p.map(x=>x.id===a.id?a:x)); setAdminView("lista");
    }catch(e){alert("Error: "+e.message);}
    finally{setSubmitting(false);}
  },[editData,selected,submitting]);

  const handleDelete=useCallback(async(id)=>{
    try{ await DB.delete(id); setArbitros(p=>p.filter(a=>a.id!==id)); setDeleteConfirm(null); setAdminView("lista"); }
    catch(e){alert("Error: "+e.message);}
  },[]);

  const openEdit = (a) => { setSelected(a); setEditData({...a}); setAdminView("editar"); };
  const openCred = (a) => { setSelected(a); setAdminView("credencial"); };
  const goLista  = () => { setAdminView("lista"); setNuevoData(EMPTY); };

  const filtered = arbitros.filter(a=>{
    const m=`${a.nombre||""} ${a.apellido_paterno||""} ${a.apellido_materno||""} ${a.codigo||""}`.toLowerCase().includes(search.toLowerCase());
    return m&&(filterEst==="Todos"||a.estatus===filterEst);
  });

  return (
    <div className="min-h-screen bg-slate-950 text-white" style={{fontFamily:"'DM Sans',sans-serif"}}>
      <header className="border-b border-slate-800/80 bg-slate-900/70 backdrop-blur-sm sticky top-0 z-20">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center font-display text-white text-lg">AF</div>
            <div><div className="font-display text-xl tracking-widest leading-none">AFFL REFEREES</div><div className="text-[10px] text-slate-500 uppercase tracking-widest">La Laguna</div></div>
          </div>
          <div className="flex gap-2 items-center">
            {adminMode && adminView!=="lista" && <button onClick={goLista} className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 transition-all">← Lista</button>}
            {adminMode
              ? <button onClick={handleAdminLogout} className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-xs text-slate-400 transition-all">⎋ Admin</button>
              : <button onClick={()=>setShowAdminLogin(true)} className="px-3 py-1.5 rounded-lg bg-slate-800/50 hover:bg-slate-800 text-xs text-slate-600 hover:text-slate-400 transition-all">Admin</button>}
          </div>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6 fade-in">
        {/* PÚBLICO */}
        {!adminMode && (
          <>
            {publicView==="registro" && <RegistroForm onSuccess={handlePublicSuccess}/>}
            {publicView==="exito" && publicResult && <SuccessPublico arbitro={publicResult} onNuevo={()=>{setPublicView("registro");setPublicResult(null);}}/>}
          </>
        )}

        {/* ADMIN */}
        {adminMode && (
          <>
            {loading && <div className="flex justify-center py-20"><div className="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"/></div>}

            {!loading && adminView==="lista" && (
              <div className="space-y-5">
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                  {[{l:"Total",v:arbitros.length,c:"text-white"},{l:"Activos",v:arbitros.filter(a=>a.estatus==="Activo").length,c:"text-emerald-400"},{l:"Inactivos",v:arbitros.filter(a=>a.estatus==="Inactivo").length,c:"text-slate-400"},{l:"Suspendidos",v:arbitros.filter(a=>a.estatus==="Suspendido").length,c:"text-red-400"}].map(s=>(
                    <div key={s.l} className="bg-slate-900/60 border border-slate-800 rounded-xl p-4"><div className={`text-2xl font-display ${s.c}`}>{s.v}</div><div className="text-xs text-slate-500 uppercase tracking-widest mt-0.5">{s.l}</div></div>
                  ))}
                </div>
                <div className="flex flex-col sm:flex-row gap-3">
                  <input value={search} onChange={e=>setSearch(e.target.value.toUpperCase())} placeholder="BUSCAR POR NOMBRE O CÓDIGO..." className="flex-1 bg-slate-900/60 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500/50 transition-all uppercase"/>
                  <div className="flex gap-2 flex-wrap">{["Todos",...ESTATUSES].map(e=><button key={e} onClick={()=>setFilterEst(e)} className={`px-3 py-2 rounded-xl text-xs font-semibold transition-all ${filterEst===e?"bg-blue-600 text-white":"bg-slate-900/60 border border-slate-800 text-slate-400 hover:text-white"}`}>{e}</button>)}</div>
                </div>

                {/* BOTONES ADMIN */}
                <div className="flex gap-3 flex-wrap">
                  <button onClick={()=>setAdminView("nuevo")} className="px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm transition-all">+ Nuevo Árbitro</button>
                  <button onClick={()=>printRoster(arbitros)} className="px-4 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold text-sm transition-all flex items-center gap-2">
                    🖨️ Imprimir Roster
                  </button>
                </div>

                {filtered.length===0?(
                  <div className="text-center py-20 text-slate-600"><div className="text-5xl mb-3">🏈</div><div className="font-display text-2xl tracking-widest">SIN ÁRBITROS</div><div className="text-sm mt-2">Aún no hay registros</div></div>
                ):(
                  <div className="bg-slate-900/40 border border-slate-800 rounded-2xl overflow-hidden">
                    <table className="w-full text-sm">
                      <thead><tr className="border-b border-slate-800"><th className="text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-slate-500">Árbitro</th><th className="text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-slate-500 hidden sm:table-cell">Nivel</th><th className="text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-slate-500">Estatus</th><th className="px-4 py-3"></th></tr></thead>
                      <tbody>{filtered.map((a,i)=>(
                        <tr key={a.id} className={`border-b border-slate-800/50 last:border-0 ${i%2===0?"bg-slate-900/20":""}`}>
                          <td className="px-4 py-3"><div className="flex items-center gap-3">{a.fotografia?<img src={a.fotografia} alt="" className="w-10 h-10 rounded-full object-cover border-2 border-slate-700 flex-shrink-0"/>:<div className="w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-700 flex items-center justify-center flex-shrink-0">👤</div>}<div><div className="font-display text-blue-400 tracking-widest text-sm leading-none">{a.codigo}</div><div className="text-white font-medium">{a.nombre} {a.apellido_paterno}</div><div className="text-slate-500 text-xs">{a.ciudad}</div></div></div></td>
                          <td className="px-4 py-3 hidden sm:table-cell"><span className={`px-2 py-1 rounded-lg text-xs font-semibold ${NVC[a.nivel]||"text-slate-400"}`}>{a.nivel||"—"}</span></td>
                          <td className="px-4 py-3"><span className={`px-2 py-1 rounded-lg text-xs font-semibold ${BADGE[a.estatus]}`}>{a.estatus}</span></td>
                          <td className="px-4 py-3"><div className="flex gap-2 justify-end"><button onClick={()=>openCred(a)} className="px-3 py-1.5 rounded-lg bg-blue-500/15 hover:bg-blue-500/30 text-blue-400 text-xs font-bold transition-all">Credencial</button><button onClick={()=>openEdit(a)} className="px-2.5 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold transition-all">Editar</button><button onClick={()=>setDeleteConfirm(a.id)} className="px-2.5 py-1.5 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 text-xs font-semibold transition-all">✕</button></div></td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
            {!loading && adminView==="nuevo" && <EditForm formData={nuevoData} setFormData={setNuevoData} onSave={handleNuevo} onCancel={goLista} submitting={submitting} isNuevo={true}/>}
            {!loading && adminView==="credencial" && selected && <Credencial arbitro={selected} onEdit={openEdit} onDelete={id=>setDeleteConfirm(id)}/>}
            {!loading && adminView==="editar" && selected && <EditForm formData={editData} setFormData={setEditData} onSave={handleEdit} onCancel={goLista} submitting={submitting}/>}
          </>
        )}
      </main>

      {showAdminLogin && <AdminLogin onLogin={handleAdminLogin} onCancel={()=>setShowAdminLogin(false)}/>}

      {deleteConfirm&&(
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-red-500/30 rounded-2xl p-6 max-w-sm w-full space-y-4">
            <div className="font-display text-2xl tracking-widest text-red-400">¿CONFIRMAR?</div>
            <p className="text-slate-300 text-sm">El registro se eliminará permanentemente.</p>
            <div className="flex gap-3"><button onClick={()=>setDeleteConfirm(null)} className="flex-1 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold text-sm">Cancelar</button><button onClick={()=>handleDelete(deleteConfirm)} className="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold text-sm">Eliminar</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
